<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Center — NukaSoft</title>
  <link rel="icon" href="/assets/images/skippy-avatar.png">
  <link rel="stylesheet" href="/command-center/pipboy.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="/command-center/theme.js"></script>
  <style>
    body { padding: 0; margin: 0; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 2vh 4vw; }
    h1.page-title {
      font-family: var(--font-heading, 'Orbitron', sans-serif);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin: 2vh 0 0.5vh 0;
    }
    .subtitle {
      opacity: 0.6;
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.75rem, 1.5vh, 0.9rem);
      margin-bottom: 2vh;
    }
    .fleet-stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.75rem, 1.5vh, 0.9rem);
      padding: 1.2vh 2vw;
      margin-bottom: 3vh;
      border: 1px solid var(--pip-green);
      background: rgba(24, 255, 98, 0.04);
      display: flex; flex-wrap: wrap; gap: 2vw;
    }
    body.theme-overseer .fleet-stats { background: rgba(10, 132, 193, 0.06); }
    .stat-item { white-space: nowrap; }
    .stat-count { font-weight: 700; }

    .doors {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 2vh 2vw;
    }
    .door {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 1.5vw;
      align-items: start;
      text-decoration: none;
      color: var(--pip-green);
      border: 1px solid var(--pip-green);
      background: rgba(24, 255, 98, 0.04);
      padding: 2vh 1.8vw;
      transition: background 0.15s, transform 0.1s;
      min-height: 180px;
    }
    .door:hover, .door:active {
      background: rgba(24, 255, 98, 0.12);
      transform: translateX(3px);
    }
    body.theme-overseer .door { background: rgba(10, 132, 193, 0.06); }
    body.theme-overseer .door:hover,
    body.theme-overseer .door:active { background: rgba(10, 132, 193, 0.16); }

    .door-portrait {
      width: 140px; height: 140px;
      object-fit: cover;
      border: 2px solid var(--pip-green);
      filter: saturate(0.85) contrast(1.05);
    }
    .door-body { min-width: 0; }
    .door-dept {
      font-family: var(--font-heading, 'Orbitron', sans-serif);
      font-size: clamp(1.05rem, 2.3vh, 1.4rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0 0 0.3vh 0;
    }
    .door-lead {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.7rem, 1.3vh, 0.82rem);
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1vh;
    }
    .door-tagline {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(0.85rem, 1.6vh, 1rem);
      opacity: 0.9;
      margin-bottom: 1vh;
      line-height: 1.3;
    }
    .door-stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(0.65rem, 1.2vh, 0.75rem);
      display: flex; gap: 1.5vw;
      opacity: 0.75;
    }
    .door-stat .n {
      font-weight: 700;
      font-size: clamp(0.95rem, 1.9vh, 1.1rem);
      display: block;
    }

    .empty {
      text-align: center;
      padding: 6vh 0;
      opacity: 0.6;
      font-family: 'JetBrains Mono', monospace;
    }
    .pip-breadcrumb { display: flex; align-items: center; gap: 0.5em; flex-wrap: wrap; }
    .pip-breadcrumb .spacer { flex: 1; }
  </style>
</head>
<body>
  <nav class="pip-breadcrumb">
    <a href="/">HOME</a>
    <span class="sep">▸</span>
    <a href="/crew/">CREW BIOS</a>
    <span class="sep">▸</span>
    <a href="/">SITE</a>
    <span class="sep">▸</span>
    <span class="active">COMMAND CENTER</span>
    <span class="spacer"></span>
    <div data-theme-widget></div>
  </nav>

  <div class="wrap">
    <h1 class="page-title">◆ Command Center</h1>
    <div class="subtitle">Four departments. Four leads. Eighteen Artificial Persons and sixty-six tools on the wall. Step into any room.</div>

    <div class="fleet-stats" id="stats">
      <span class="stat-item"><span class="stat-count" id="stat-crew">-</span> crew</span>
      <span class="stat-item"><span class="stat-count" id="stat-tools">-</span> tools</span>
      <span class="stat-item"><span class="stat-count" id="stat-active">-</span> active</span>
      <span class="stat-item"><span class="stat-count" id="stat-improve">-</span> improve</span>
      <span class="stat-item"><span class="stat-count" id="stat-merge">-</span> merge</span>
      <span class="stat-item"><span class="stat-count" id="stat-mothball">-</span> mothball</span>
    </div>

    <div class="doors" id="doors">
      <div class="empty">// loading department rooms...</div>
    </div>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    async function load() {
      try {
        const [leadsRes, crewRes, toolsRes] = await Promise.all([
          fetch('/command-center/manifests/departments.json?t=' + Date.now()),
          fetch('/command-center/manifests/crew.json?t='    + Date.now()),
          fetch('/command-center/manifests/tools.json?t='       + Date.now()).catch(() => null),
        ]);
        const leads = await leadsRes.json();
        const crew  = await crewRes.json();
        const tools = toolsRes && toolsRes.ok ? await toolsRes.json() : [];
        render(leads, crew, tools);
      } catch (e) {
        document.getElementById('doors').innerHTML =
          '<div class="empty">// error loading manifests: ' + escapeHtml(e.message) + '</div>';
      }
    }

    function render(leads, crew, tools) {
      // stats
      document.getElementById('stat-crew').textContent  = crew.length;
      document.getElementById('stat-tools').textContent = tools.length;
      document.getElementById('stat-active').textContent   = crew.filter(c => c.status === 'ACTIVE').length;
      document.getElementById('stat-improve').textContent  = crew.filter(c => c.status === 'IMPROVE').length;
      document.getElementById('stat-merge').textContent    = crew.filter(c => c.status === 'MERGE').length;
      document.getElementById('stat-mothball').textContent = crew.filter(c => c.status === 'MOTHBALL').length;

      const container = document.getElementById('doors');
      container.innerHTML = leads.map(lead => {
        const crewCount  = crew.filter(c => c.department === lead.department).length;
        const toolCount  = tools.filter(t => t.department === lead.department).length;
        return `
          <a class="door" href="/command-center/${encodeURIComponent(lead.slug)}/">
            <img class="door-portrait" src="${escapeHtml(lead.lead_portrait)}" alt="${escapeHtml(lead.lead_name)} portrait" loading="lazy">
            <div class="door-body">
              <div class="door-dept">${escapeHtml(lead.department)}</div>
              <div class="door-lead">Lead: ${escapeHtml(lead.lead_name)} · ${escapeHtml(lead.lead_persona)}</div>
              <div class="door-tagline">${escapeHtml(lead.tagline)}</div>
              <div class="door-stats">
                <div class="door-stat"><span class="n">${crewCount}</span>crew</div>
                <div class="door-stat"><span class="n">${toolCount}</span>tools</div>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }

    load();
  </script>
</body>
</html>
